postgres:
  host: localhost
  user: postgres
  password: postgres
  name: engine
  port: 5445
  ssl_mode: disable
  max_open_connections: 20
  max_idle_connections: 20
  auto_migrate: true

kafka:
  brokers:
    - localhost:29092
  group_id: sagaflow-orchestrator
  client_id: sagaflow-orchestrator-1
  step_result_topic: saga.step.result
  dial_timeout: 5s
  read_timeout: 5s
  commit_interval: 0
  start_offset: 0

runner:
  sagas_dir_path: ./../sagas
  hostname: instance1
  workers_num: 3
  batch_size: 4
  empty_batch_delay: 1s
  lock_timeout: 10s

handlers:
  call_timeout: 5s
  endpoints:
    # service_name:host:port
    - warehouse:warehouse:50051
    - payments:payments:50052
    - shop:shop:50053
    - id:id:50054
    - notifications:notifications:50055

verification_sources:
  orders_db:
    type: postgres
    dsn: "${ORDERS_DB_DSN}"
    timeout: 3s
  analytics_db:
    type: clickhouse
    dsn: "${CLICKHOUSE_DSN}"
    timeout: 5s
  payment_api:
    type: rest
    baseUrl: "${PAYMENT_API_URL}"
    timeout: 2s
  document_store:
    type: mongo
    uri: "${MONGO_URI}"
    database: "orders"
    timeout: 3s

api:
  port: 3731