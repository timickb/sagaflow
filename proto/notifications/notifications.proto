syntax = "proto3";

package notifications.v1;

import "sagaflow/sagaflow.proto";

option go_package = "github.com/timickb/sagaflow/proto/gen/go/notifications;notifications";

service NotificationsService {
  rpc SendEmail(SendEmailRequest) returns (SendEmailResponse);
}

message SendEmailRequest {
  sagaflow.v1.StepExecutionMeta meta = 1;
  string mail_to = 2;
  string subject = 3;
  string body = 4;
}

message SendEmailResponse {
  string notification_id = 1;
}
