syntax = "proto3";

package shop.v1;

option go_package = "github.com/timickb/sagaflow/proto/gen/go/shop;shop";

service ShopService {
  rpc GetOrderDetails(GetOrderDetailsRequest) returns (GetOrderDetailsResponse);
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
}

message GetOrderDetailsRequest {
  string order_id = 1;
}

message GetOrderDetailsResponse {
  string order_id = 1;
  string user_id = 2;
  string status = 3;
  repeated OrderItem items = 4;
  string total_amount = 5;
  string currency = 6;
}

message OrderItem {
  string product_id = 1;
  string title = 2;
  int32 quantity = 3;
  string price = 4;
}

message CreateOrderRequest {
  string user_id = 1;
  repeated OrderItem items = 2;
}

message CreateOrderResponse {
  string order_id = 1;
}
