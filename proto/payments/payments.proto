syntax = "proto3";

package payments.v1;

import "sagaflow/sagaflow.proto";

option go_package = "github.com/timickb/sagaflow/proto/gen/go/payments;payments";

service PaymentsService {
  rpc Capture(CaptureRequest) returns (CaptureResponse);
  rpc Authorize(AuthorizeRequest) returns (AuthorizeResponse);
  rpc Refund(RefundRequest) returns (RefundResponse);
}

message CaptureRequest {
  sagaflow.v1.StepExecutionMeta meta = 1;
  
  string order_id = 2;
  string user_id = 3;
  
  string payment_method = 4;   // 'card', 'bank_transfer', etc.
  string payment_provider = 5; // 'stripe', 'yookassa', etc.
  
  repeated CaptureItem items = 6;
}

message CaptureItem {
  string product_id = 1;
  int32 quantity = 2;
  string price = 3;            // decimal as string for precision
  string currency = 4;
}

message CaptureResponse {
  string transaction_id = 1;
  string provider_transaction_id = 2;
}

message AuthorizeRequest {
  sagaflow.v1.StepExecutionMeta meta = 1;
  string order_id = 2;
  string payment_method = 3;
  string payment_provider = 4;
}

message AuthorizeResponse {
  string payment_id = 1;
  string provider_transaction_id = 2;
}

message RefundRequest {
  sagaflow.v1.StepExecutionMeta meta = 1;
  string payment_id = 2;
  string transaction_id = 3;
  string amount = 4;
}

message RefundResponse {
  string transaction_id = 1;
}
