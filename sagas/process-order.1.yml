saga:
  name: process-order
  version: 1
  description: Оформление заказа в интернет-магазине
  start: ReserveInventory
  idempotency_key: ${input.order_id}

inputs:
  order_id:
    type: string
    required: true
    description: ID заказа, UUID (= ключ идемпотентности для экземпляра)
  user_id:
    type: string
    required: true
    description: ID пользователя, оформляющего заказ
  amount:
    type: integer
    required: true
    description: Сумма заказа
  items:
    type: array
    required: true
    items:
      type: object
      properties:
        sku:
          type: string
          required: true
          description: SKU товара на складе
        quantity:
          type: integer
          required: true
          description: Количество товара

steps:
  - id: ReserveInventory
    kind: action
    description: Зарезервировать товар на складе
    delay: 10s
    timeout: 10s
    compensate: ReleaseInventory
    retry:
      max_attempts: 8
      delay: 1s
      backoff: exponential
    handler:
      service: warehouse
      method: Reserve
    input:
      items: ${input.items}
      order_id: ${input.order_id}
    output:
      reservation_id: ${result.reservation_id}
    on:
      committed: ChargePayment
      failed: Fail
      rejected: Fail
      timeout: ReleaseInventory

  - id: ChargePayment
    kind: action
    description: Совершить платеж, используя заранее привязанную карту пользователя
    timeout: 10s
    retry:
      max_attempts: 5
      delay: 1s
      backoff: exponential
    handler:
      service: payments
      method: Capture
    input:
      items: ${input.items}
      user_id: ${input.user_id}
      order_id: ${input.order_id}
      amount: ${input.amount}
    on:
      committed: VerifyOrderOLTP
      rejected: ReleaseInventory
      failed: ReleaseInventory
      timeout: ReleaseInventory

  - id: ReleaseInventory
    kind: compensate
    description: Снять бронь с товаров на складе
    timeout: 10s
    retry:
      max_attempts: 5
      delay: 1s
      backoff: exponential
    handler:
      service: warehouse
      method: Release
    input:
      order_id: ${input.order_id}
    on:
      committed: Rollback
      rejected: Fail
      failed: Fail
      timeout: Fail

  - id: VerifyOrderOLTP
    kind: verify
    timeout: 10s
    retry:
      max_attempts: 5
      delay: 1s
      backoff: exponential
    verifier:
      type: sql
      datasource: payments_postgres
      query: |
        SELECT count(*)
        FROM orders
        WHERE id = ${input.order_id}
          AND status = 'PAID'
      expect:
        equals: 1
    on:
      matched: VerifyAnalyticsMaterialization
      unmatched: ReleaseInventory
      failed: ReleaseInventory
      timeout: ReleaseInventory

  - id: VerifyAnalyticsMaterialization
    kind: verify
    delay: 10s
    timeout: 10s
    retry:
      max_attempts: 5
      delay: 1s
      backoff: exponential
    verifier:
      type: sql
      datasource: clickhouse
      query: |
        SELECT count()
        FROM fct_orders FINAL
        WHERE order_id = ${input.order_id}
        AND status = 'PAID'
      expect:
        equals: 1
    on:
      matched: Success
      unmatched: ReconcileAnalyticsMaterialization
      timeout: ReconcileAnalyticsMaterialization
      failed: ReconcileAnalyticsMaterialization

  - id: ReconcileAnalyticsMaterialization
    kind: reconcile
    description: Принудительно пересобрать аналитическую проекцию заказа
    timeout: 10s
    retry:
      max_attempts: 5
      delay: 1s
      backoff: exponential
    recovery:
      max_cycles: 3
      on_exceeded: Inconsistent
    handler:
      service: analytics
      method: RebuildOrderProjection
    input:
      order_id: ${input.order_id}
    on:
      committed: VerifyAnalyticsMaterialization
      rejected: Inconsistent
      failed: Inconsistent
      timeout: Inconsistent

  - id: Success
    kind: terminal
    result: COMPLETED
  - id: Rollback
    kind: terminal
    result: COMPENSATED
  - id: Fail
    kind: terminal
    result: FAILED
  - id: Inconsistent
    kind: terminal
    result: INCONSISTENT

