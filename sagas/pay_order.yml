steps:
  - id: ReserveInventory
    kind: action
    handler:
      service: inventory
      method: Reserve

  - id: ChargePayment
    kind: action
    handler:
      service: payment
      method: Capture

  - id: VerifyOrderOLTP
    kind: verify
    verifier:
      type: sql
      datasource: inventory_postgres
      query: |
        SELECT count(*)
        FROM inventory_reservation
        WHERE order_id = :order_id
          AND status = 'ACTIVE'
      expect:
        equals: 1

  - id: VerifyAnalyticsMaterialization
    kind: verify
    verifier:
      type: sql
      datasource: clickhouse
      query: |
        SELECT count()
        FROM fct_orders
        WHERE order_id = :order_id
      expect:
        equals: 1
